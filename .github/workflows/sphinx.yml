name: Deploy documentation

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

env:
  image_name: ghcr.io/elolab/gladiator-nf/sphinx

jobs:
  build-image:
    name: Build Sphinx image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Log in to Docker registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Build Sphinx image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: doc/.sphinx/sphinx.Dockerfile
          tags: "${{env.image_name}}:latest"
          push: true
          cache-from: type=registry,ref=${{env.image_name}}:latest
          cache-to: type=inline

  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      contents: read
      packages: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Log in to Docker registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Build documentation
        run: |
          docker run -v ${{github.workspace}}:/home/ubuntu/workspace "${{env.image_name}}:latest" \
              bash -c "sudo chown ubuntu:ubuntu /home/ubuntu/workspace/ -R && /home/ubuntu/workspace/doc/.sphinx/build.sh"
      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v4
        with:
          path: doc/dist

  deploy:
    name: Publish
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
